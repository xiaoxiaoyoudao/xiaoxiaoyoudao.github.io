name: Update Config via API

on:
  repository_dispatch:
    types: [stun-port-update]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update config.json via API
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.a233 }}
          script: |
            const port = context.payload.client_payload.port;
            if (!port) throw new Error('No port provided');

            // 1. 获取当前文件内容
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'config.json'
            });

            // 2. 解码并解析 JSON
            const currentContent = Buffer.from(file.content, 'base64').toString('utf8');
            const config = JSON.parse(currentContent);

            // 3. 找到要修改的链接（text 为 "sealchat V4"）
            const targetLink = config.links.find(link => link.text === 'sealchat V4');
            if (!targetLink) {
              throw new Error('未找到 sealchat V4 链接');
            }

            // 4. 解析原 URL，替换端口
            let oldUrl = targetLink.url;
            // 确保 URL 格式正确（处理可能缺失协议的情况）
            if (!oldUrl.startsWith('http://') && !oldUrl.startsWith('https://')) {
              oldUrl = 'http://' + oldUrl; // 默认添加 http://
            }
            const urlObj = new URL(oldUrl);
            urlObj.port = port;              // 设置新端口
            targetLink.url = urlObj.href;    // 更新

            // 5. 重新序列化 JSON
            const newContent = JSON.stringify(config, null, 2);
            const contentBase64 = Buffer.from(newContent).toString('base64');

            // 6. 更新文件
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'config.json',
              message: `Auto-update: STUN port changed to ${port}`,
              content: contentBase64,
              sha: file.sha
            });
